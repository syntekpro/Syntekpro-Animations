name: Build and Publish Plugin Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build plugin zip
        run: |
          mkdir -p dist/syntekpro-animations
          rsync -av \
            --exclude='.git*' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='releases' \
            ./ dist/syntekpro-animations/
          cd dist
          zip -r "syntekpro-animations-${VERSION}.zip" syntekpro-animations

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/syntekpro-animations-${{ env.VERSION }}.zip
