<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#0a0a0a"/>
  <rect x="220" y="0" width="180" height="200" fill="rgba(217,119,87,0.08)"/>
  <!-- Product image placeholder -->
  <rect x="240" y="20" width="140" height="160" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="310" y="105" font-family="system-ui,sans-serif" font-size="6" fill="rgba(255,255,255,0.15)" text-anchor="middle">Product Image</text>
  <!-- Sale badge -->
  <rect x="26" y="20" width="24" height="10" rx="2" fill="#d97757"/>
  <text x="30" y="27.5" font-family="system-ui,sans-serif" font-size="4.5" fill="#fff" font-weight="800" letter-spacing="0.8">SALE</text>
  <!-- Category -->
  <text x="26" y="47" font-family="system-ui,sans-serif" font-size="4.5" fill="#d97757" font-weight="600" letter-spacing="1.2">SPRING COLLECTION 2026</text>
  <!-- Title -->
  <text x="26" y="64" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="800">Italian Leather</text>
  <text x="26" y="80" font-family="system-ui,sans-serif" font-size="14" fill="#fff" font-weight="800">Crossbody Bag</text>
  <!-- Description -->
  <text x="26" y="98" font-family="system-ui,sans-serif" font-size="5" fill="rgba(255,255,255,0.45)">Hand-stitched full-grain leather with</text>
  <text x="26" y="106" font-family="system-ui,sans-serif" font-size="5" fill="rgba(255,255,255,0.45)">brass hardware. Adjustable strap.</text>
  <!-- Prices -->
  <text x="26" y="124" font-family="system-ui,sans-serif" font-size="6" fill="rgba(255,255,255,0.3)" text-decoration="line-through">$489.00</text>
  <text x="62" y="124" font-family="system-ui,sans-serif" font-size="12" fill="#d97757" font-weight="800">$349.00</text>
  <!-- Buttons -->
  <rect x="26" y="140" width="56" height="18" rx="3" fill="#d97757"/>
  <text x="38" y="152" font-family="system-ui,sans-serif" font-size="5.5" fill="#fff" font-weight="700">Shop Now</text>
  <rect x="88" y="140" width="52" height="18" rx="3" fill="transparent" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
  <text x="95" y="152" font-family="system-ui,sans-serif" font-size="5" fill="rgba(255,255,255,0.5)">♥ Wishlist</text>
  <rect x="0" y="0" width="400" height="200" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" rx="4"/>
</svg>